apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm-mcp-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm-mcp-sim
  template:
    metadata:
      labels:
        app: arm-mcp-sim
    spec:
      containers:
        - name: arm-mcp-sim
          image: robotic-arm/arm-mcp-sim:local
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8010"
            - name: MCP_BACKEND
              value: ros2
            - name: MCP_SAFETY_PROFILE
              value: testing
            - name: MCP_PLANNER
              value: basic
            - name: MCP_PLANNER_SYNC_PERCEPTION
              value: "true"
            - name: MCP_PLANNER_CLEARANCE_MM
              value: "80"
            - name: MCP_COLLISION_PADDING_MM
              value: "15"
            - name: ROS_DOMAIN_ID
              value: "42"
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
            - name: CYCLONEDDS_URI
              value: file:///config/cyclonedds.xml
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arm-mcp-key
                  key: MCP_API_KEY
          ports:
            - containerPort: 8010
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: cyclonedds-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: cyclonedds-config
          configMap:
            name: cyclonedds-config
