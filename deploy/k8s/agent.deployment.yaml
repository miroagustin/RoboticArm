apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm-agent
  template:
    metadata:
      labels:
        app: arm-agent
    spec:
      containers:
        - name: arm-agent
          image: robotic-arm/arm-agent:local
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_URL
              value: http://arm-mcp-sim:8010/mcp
            - name: LLM_API_BASE
              value: http://host.minikube.internal:8000/v1
            - name: AGENTSCOPE_STUDIO_URL
              value: http://as-studio:3000
            - name: REME_WORKING_DIR
              value: /app/robotic-arm-agent/.reme
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arm-mcp-key
                  key: MCP_API_KEY
          readinessProbe:
            exec:
              command: ["python", "smoke.py", "check-mcp"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["python", "smoke.py", "check-mcp"]
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: reme-data
              mountPath: /app/robotic-arm-agent/.reme
      volumes:
        - name: reme-data
          emptyDir: {}
